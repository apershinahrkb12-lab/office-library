<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1a18;
  --ink-2: #4a4a45;
  --ink-3: #8a8a84;
  --paper: #f5f3ee;
  --paper-2: #eceae4;
  --paper-3: #dedad2;
  --accent: #2d5be3;
  --accent-bg: #eef2fd;
}
@media (prefers-color-scheme: dark) {
  :root {
    --ink: #f0ede6;
    --ink-2: #aaa89f;
    --ink-3: #6a6a62;
    --paper: #141412;
    --paper-2: #1e1e1b;
    --paper-3: #2a2a26;
    --accent: #6b8ef5;
    --accent-bg: #1a1f35;
  }
}
body { font-family: 'Inter', system-ui, sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

.header { padding: 3rem 2rem 2rem; max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
.header-left h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(1.5rem, 4vw, 2.3rem); font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; }
.header-left p { margin-top: 0.5rem; font-size: 13px; color: var(--ink-3); }
.header-count { font-family: 'Unbounded', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 600; color: var(--paper-3); line-height: 1; letter-spacing: -0.04em; user-select: none; }

.toolbar { max-width: 1100px; margin: 0 auto; padding: 0 2rem 1rem; }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }
#search { width: 100%; height: 42px; padding: 0 14px 0 40px; font-size: 14px; font-family: inherit; background: var(--paper-2); border: 1.5px solid var(--paper-3); border-radius: 10px; color: var(--ink); outline: none; transition: border-color 0.15s; }
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--ink-3); }

.filters { max-width: 1100px; margin: 0 auto; padding: 0.75rem 2rem 1rem; display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { font-size: 12px; font-family: inherit; padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--paper-3); background: var(--paper-2); color: var(--ink-2); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
.filter-btn:hover { border-color: var(--ink-3); color: var(--ink); }
.filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 500; }

.stats { max-width: 1100px; margin: 0 auto; padding: 0 2rem 0.75rem; font-size: 13px; color: var(--ink-3); }
.stats strong { color: var(--ink-2); font-weight: 500; }

.grid { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }

.card { background: var(--paper-2); border: 1.5px solid var(--paper-3); border-radius: 14px; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.12s, transform 0.1s; }
.card:hover { border-color: var(--ink-3); transform: translateY(-2px); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.card-meta { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 500; line-height: 1.35; color: var(--ink); }
.card-author { font-size: 12px; color: var(--ink-3); margin-top: 3px; }
.badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
.card-desc { font-size: 13px; color: var(--ink-2); line-height: 1.65; flex: 1; min-height: 42px; }
.card-footer { display: flex; align-items: center; padding-top: 8px; border-top: 1px solid var(--paper-3); }
.status { font-size: 11px; color: var(--ink-3); display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf82; flex-shrink: 0; }
.dot.away { background: #e8a020; }

.skel { background: var(--paper-3); border-radius: 4px; display: block; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.7} }

.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--ink-3); font-size: 14px; }
.empty svg { display: block; margin: 0 auto 1rem; opacity: .25; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 3px; }
</style>

  "Художественная": ["Поправки-22","Числа","Великий Гэтсби","99 франков","Мастер и Маргарита","Сияние","Узорный покров","Игра престолов","Гарри Поттер","Фантастические твари","Медленной шлюпкой","Подземка","Сжечь сарай","Собор Парижской","Атлант расправил","Источник","Мы живые","Invisible Monsters","Haunted","Часы","Шпион, пришедший","Такой же предатель","В круге первом","Тэсс","Свои","Хроники Раздолбая","Огонь изнутри","Дорога к свободе","Вышел хеджер","Время колоть лёд","Была и думы","Душа, не знающая"],
  "Письмо и речь": ["Как писать хорошо","Простые правила сильного текста","К выступлению готов","Путешествие писателя","Презентационный конструктор"],
};

const BADGE_COLORS = {
  "Менеджмент":    { bg: "#eef0fe", text: "#3d4cc4" },
  "Маркетинг":     { bg: "#fef0ea", text: "#b84a1a" },
  "Бизнес-истории":{ bg: "#e8f7f0", text: "#0f6e50" },
  "Стратегия":     { bg: "#e8f2fd", text: "#1a5fa8" },
  "Инвестиции":    { bg: "#fdf4e0", text: "#8a5500" },
  "Психология":    { bg: "#fcedf4", text: "#9a2f5e" },
  "Художественная":{ bg: "#f1efe9", text: "#5a5850" },
  "Письмо и речь": { bg: "#edf7e8", text: "#2e6b18" },
  "Другое":        { bg: "#f1efe9", text: "#5a5850" },
};

function getCategory(title) {
  for (const [cat, kws] of Object.entries(CATEGORIES)) {
    if (kws.some(k => title.includes(k))) return cat;
  }
  return "Другое";
}

const books = BOOKS_RAW.map(([author, title, status]) => ({
  author, title, status,
  cat: getCategory(title),
  desc: null, loaded: false,
}));

document.getElementById("totalCount").textContent = books.length;

let activeFilter = "Все";
let searchVal = "";
const ALL_CATS = ["Все", ...Object.keys(BADGE_COLORS).filter(c => c !== "Другое")];

const filtersEl = document.getElementById("filters");
ALL_CATS.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (cat === "Все" ? " active" : "");
  btn.textContent = cat;
  btn.onclick = () => {
    activeFilter = cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.textContent === cat));
    render();
  };
  filtersEl.appendChild(btn);
});

document.getElementById("search").addEventListener("input", e => {
  searchVal = e.target.value.toLowerCase();
  render();
});

const loadingSet = new Set();

async function loadDesc(book) {
  if (book.loaded || loadingSet.has(book.title)) return;
  loadingSet.add(book.title);
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 150,
        messages: [{ role: "user", content: `Книга: "${book.title}", автор: ${book.author}. Напиши ровно 2 коротких предложения на русском: о чём книга и чем она полезна. Только текст, без пояснений.` }]
      })
    });
    const data = await resp.json();
    book.desc = data.content?.[0]?.text?.trim() || "";
  } catch(e) { book.desc = ""; }
  book.loaded = true;
  const el = document.querySelector('[data-title="' + CSS.escape(book.title) + '"] .card-desc');
  if (el) el.textContent = book.desc;
}

function render() {
  const filtered = books.filter(b => {
    const matchCat = activeFilter === "Все" || b.cat === activeFilter;
    const matchQ = !searchVal || b.title.toLowerCase().includes(searchVal) || b.author.toLowerCase().includes(searchVal);
    return matchCat && matchQ;
  });

  document.getElementById("stats").innerHTML = `Показано <strong>${filtered.length}</strong> из <strong>${books.length}</strong> книг`;

  const gridEl = document.getElementById("grid");
  if (!filtered.length) {
    gridEl.innerHTML = `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Ничего не найдено</div>`;
    return;
  }

  gridEl.innerHTML = "";
  filtered.forEach(book => {
    const colors = BADGE_COLORS[book.cat] || BADGE_COLORS["Другое"];
    const away = book.status !== "в офисе";
    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-title", book.title);
    const descHtml = book.loaded
      ? book.desc
      : `<span class="skel" style="height:13px;width:88%;margin-bottom:5px"></span><span class="skel" style="height:13px;width:66%"></span>`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-meta">
          <div class="card-title">${book.title}</div>
          <div class="card-author">${book.author}</div>
        </div>
        <span class="badge" style="background:${colors.bg};color:${colors.text}">${book.cat}</span>
      </div>
      <div class="card-desc">${descHtml}</div>
      <div class="card-footer">
        <span class="status"><span class="dot${away ? " away" : ""}"></span>${away ? "У сотрудника" : "В офисе"}</span>
      </div>`;
    gridEl.appendChild(card);
    if (!book.loaded) setTimeout(() => loadDesc(book), 100);
  });
}

render();
</script>
</body>
</html>
