<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека офиса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--ink-2:#4a4a45;--ink-3:#8a8a84;
  --paper:#f5f3ee;--paper-2:#eceae4;--paper-3:#dedad2;
  --green:#3da874;--orange:#d4880e;--blue:#2d5be3;--blue-bg:#eef2fd;
}
@media(prefers-color-scheme:dark){:root{
  --ink:#f0ede6;--ink-2:#aaa89f;--ink-3:#6a6a62;
  --paper:#141412;--paper-2:#1e1e1b;--paper-3:#2a2a26;
}}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.header{padding:2.5rem 2rem 1.5rem;max-width:1160px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;border-bottom:1px solid var(--paper-3)}
.header h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.4rem,3.5vw,2rem);font-weight:600;line-height:1.1;letter-spacing:-.02em}
.header p{margin-top:.4rem;font-size:12px;color:var(--ink-3)}
.hcount{font-family:'Unbounded',sans-serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:600;color:var(--paper-3);line-height:1;letter-spacing:-.04em;user-select:none}
.controls{max-width:1160px;margin:0 auto;padding:1.25rem 2rem 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.swrap{position:relative;flex:1;min-width:200px}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
#search{width:100%;height:40px;padding:0 12px 0 36px;font-size:14px;font-family:inherit;background:var(--paper-2);border:1.5px solid var(--paper-3);border-radius:10px;color:var(--ink);outline:none;transition:border-color .15s}
#search:focus{border-color:var(--blue)}
#search::placeholder{color:var(--ink-3)}
.vbtns{display:flex;gap:4px}
.vbtn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--paper-3);background:var(--paper-2);color:var(--ink-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.vbtn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.vbtn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.filters{max-width:1160px;margin:0 auto;padding:.75rem 2rem 0;display:flex;gap:6px;flex-wrap:wrap}
.fbtn{font-size:12px;font-family:inherit;padding:5px 13px;border-radius:20px;border:1.5px solid var(--paper-3);background:var(--paper-2);color:var(--ink-2);cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--ink-3);color:var(--ink)}
.fbtn.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);font-weight:500}
.stats{max-width:1160px;margin:0 auto;padding:.75rem 2rem .5rem;font-size:13px;color:var(--ink-3)}
.stats strong{color:var(--ink-2);font-weight:500}

/* GRID */
.grid{max-width:1160px;margin:0 auto;padding:0 2rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px}
.card{background:var(--paper-2);border:1.5px solid var(--paper-3);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--ink-3);transform:translateY(-3px)}
.ccover{width:100%;aspect-ratio:2/3;overflow:hidden;flex-shrink:0;position:relative;background:var(--paper-3)}
.ccover img.real{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;z-index:2}
.ccover img.real.loaded{opacity:1}
.ccover img.ph{width:100%;height:100%;object-fit:cover;display:block}
.cbody{padding:11px 13px;display:flex;flex-direction:column;gap:7px;flex:1}
.cbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;width:fit-content}
.ctitle{font-size:13px;font-weight:500;line-height:1.35;color:var(--ink)}
.cauthor{font-size:11px;color:var(--ink-3)}
.dtoggle{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-3);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;transition:color .12s;margin-top:2px;width:fit-content}
.dtoggle:hover{color:var(--ink-2)}
.dtoggle svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;transition:transform .2s;flex-shrink:0}
.dtoggle.open svg{transform:rotate(180deg)}
.dbody{font-size:12px;color:var(--ink-2);line-height:1.65;overflow:hidden;max-height:0;transition:max-height .3s ease}
.dbody.open{max-height:400px}
.cfoot{padding:8px 13px;border-top:1px solid var(--paper-3);display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto}
.status{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:4px;flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.away{background:var(--orange)}
.book-btn{font-size:11px;font-family:inherit;font-weight:500;padding:4px 10px;border-radius:7px;border:1.5px solid var(--paper-3);background:var(--paper);color:var(--ink-2);cursor:pointer;transition:all .12s;white-space:nowrap}
.book-btn:hover:not(:disabled){border-color:var(--green);color:#1a6640;background:#f0faf5}
.book-btn:disabled{opacity:.4;cursor:default}
.book-btn.done{border-color:var(--green);color:#1a6640;background:#f0faf5}

/* LIST */
.list{max-width:1160px;margin:0 auto;padding:0 2rem 4rem;display:flex;flex-direction:column;gap:5px}
.litem{background:var(--paper-2);border:1.5px solid var(--paper-3);border-radius:12px;display:flex;overflow:hidden;transition:border-color .12s}
.litem:hover{border-color:var(--ink-3)}
.lcover{width:52px;flex-shrink:0;position:relative;background:var(--paper-3)}
.lcover img.real{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;z-index:2}
.lcover img.real.loaded{opacity:1}
.lcover img.ph{width:100%;height:100%;object-fit:cover;display:block}
.lbody{flex:1;padding:10px 14px;display:flex;align-items:center;gap:12px;min-width:0}
.lmeta{flex:0 0 200px;min-width:0}
.ltitle{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lauthor{font-size:11px;color:var(--ink-3);margin-top:2px}
.lbadge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.ldesc{flex:1;font-size:12px;color:var(--ink-2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-width:0}
@media(max-width:640px){.ldesc{display:none}}
.lfoot{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lstatus{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:4px;white-space:nowrap}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:var(--paper);font-size:13px;padding:10px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:4rem 2rem;color:var(--ink-3);font-size:14px;grid-column:1/-1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--paper-3);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <div><h1>Библиотека<br>офиса</h1><p>Нажмите «о книге» для описания · «Забронировать» скопирует запрос</p></div>
  <div class="hcount" id="tc"></div>
</div>
<div class="controls">
  <div class="swrap">
    <svg class="sico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Поиск по названию или автору…" autocomplete="off">

  <div class="vbtns">

    <button class="vbtn" id="bl" title="Список" onclick="setView('list')"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>
</div>
<div class="filters" id="filters"></div>
<div class="stats" id="stats"></div>
<div id="container"></div>
<div class="toast" id="toast"></div>

const BC={"Менеджмент": {"bg": "#eef0fe", "text": "#3d4cc4"}, "Маркетинг": {"bg": "#fef0ea", "text": "#b84a1a"}, "Бизнес-истории": {"bg": "#e8f7f0", "text": "#0f6e50"}, "Стратегия": {"bg": "#e8f2fd", "text": "#1a5fa8"}, "Инвестиции": {"bg": "#fdf4e0", "text": "#8a5500"}, "Психология": {"bg": "#fcedf4", "text": "#9a2f5e"}, "Художественная": {"bg": "#f1efe9", "text": "#5a5850"}, "Письмо и речь": {"bg": "#edf7e8", "text": "#2e6b18"}, "Другое": {"bg": "#f1efe9", "text": "#5a5850"}};
const CATS=["Все","Менеджмент","Маркетинг","Бизнес-истории","Стратегия","Инвестиции","Психология","Художественная","Письмо и речь"];
let filter="Все",q="",view="grid";
const coverCache={};

document.getElementById("tc").textContent=BOOKS.length;
const fe=document.getElementById("filters");
CATS.forEach(c=>{
  const b=document.createElement("button");
  b.className="fbtn"+(c==="Все"?" active":"");
  b.textContent=c;
  b.onclick=()=>{filter=c;document.querySelectorAll(".fbtn").forEach(x=>x.classList.toggle("active",x.textContent===c));render();};
  fe.appendChild(b);
});
document.getElementById("search").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});
function setView(v){view=v;document.getElementById("bg").classList.toggle("active",v==="grid");document.getElementById("bl").classList.toggle("active",v==="list");render();}

function toggleDesc(btn){
  const body=btn.nextElementSibling;
  const open=body.classList.toggle("open");
  btn.classList.toggle("open",open);
  btn.querySelector(".lbl").textContent=open?"свернуть":"о книге";
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

function bookIt(btn,title,author,away){
  if(away) return;
  const text=`Хочу взять книгу из офисной библиотеки: «${title}» (${author})`;
  navigator.clipboard?.writeText(text).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand("copy");document.body.removeChild(ta);
  });
  btn.textContent="Скопировано ✓";
  btn.classList.add("done");
  showToast("Запрос скопирован — вставь в общий чат 📚");
  setTimeout(()=>{btn.textContent="Забронировать";btn.classList.remove("done");},3000);
}

async function loadRealCover(title,author,imgEl){
  const key=title+"|"+author;
  if(coverCache[key]!==undefined){
    if(coverCache[key]) applyReal(imgEl,coverCache[key]);
    return;
  }
  coverCache[key]=null;
  try{
    const q2=encodeURIComponent(title+" "+author.split(/[,،]/)[0].trim());
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q2}&maxResults=3&fields=items(volumeInfo(imageLinks))`,{mode:"cors"});
    if(r.ok){
      const d=await r.json();
      for(const item of (d.items||[])){
        const links=item?.volumeInfo?.imageLinks;
        if(links){
          const url=(links.large||links.medium||links.thumbnail||links.smallThumbnail||"")
            .replace("http://","https://").replace(/zoom=\d/,"zoom=2");
          if(url){coverCache[key]=url;applyReal(imgEl,url);return;}
        }
      }
    }
  }catch(e){}
  // fallback: Open Library
  try{
    const r=await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=2&fields=cover_i`,{mode:"cors"});
    if(r.ok){
      const d=await r.json();
      const doc=(d.docs||[]).find(x=>x.cover_i);
      if(doc?.cover_i){
        const url=`https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
        coverCache[key]=url;applyReal(imgEl,url);
      }
    }
  }catch(e){}
}

function applyReal(imgEl,url){
  imgEl.src=url;
  imgEl.onload=()=>imgEl.classList.add("loaded");
}

function render(){
  const filtered=BOOKS.filter(b=>{
    const mc=filter==="Все"||b.cat===filter;
    const mq=!q||b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById("stats").innerHTML=`Показано <strong>${filtered.length}</strong> из <strong>${BOOKS.length}</strong> книг`;
  const cont=document.getElementById("container");
  cont.className=view==="grid"?"grid":"list";
  if(!filtered.length){cont.innerHTML=`<div class="empty">Ничего не найдено</div>`;return;}
  cont.innerHTML="";

  if(view==="grid"){
    filtered.forEach(book=>{
      const c=BC[book.cat]||BC["Другое"];
      const away=book.status!=="в офисе";
      const el=document.createElement("div");
      el.className="card";
      el.innerHTML=`
        <div class="ccover">
          <img class="ph" src="${book.placeholder}" alt="${book.title}">
          <img class="real" src="" alt="${book.title}">
        </div>
        <div class="cbody">
          <span class="cbadge" style="background:${c.bg};color:${c.text}">${book.cat}</span>
          <div class="ctitle">${book.title}</div>
          <div class="cauthor">${book.author}</div>
          <button class="dtoggle" onclick="toggleDesc(this)">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            <span class="lbl">о книге</span>
          </button>
          <div class="dbody">${book.desc}</div>
        </div>
        <div class="cfoot">
          <span class="status"><span class="dot${away?" away":""}"></span>${away?"У сотрудника":"В офисе"}</span>
          <button class="book-btn" ${away?"disabled":""} onclick="bookIt(this,'${book.title.replace(/'/g,"\\'")}','${book.author.replace(/'/g,"\\'")}',${away})">${away?"Недоступна":"Забронировать"}</button>
        </div>`;
      cont.appendChild(el);
      loadRealCover(book.title,book.author,el.querySelector("img.real"));
    });
  } else {
    filtered.forEach(book=>{
      const c=BC[book.cat]||BC["Другое"];
      const away=book.status!=="в офисе";
      const el=document.createElement("div");
      el.className="litem";
      el.innerHTML=`
        <div class="lcover">
          <img class="ph" src="${book.placeholder}" alt="${book.title}">
          <img class="real" src="" alt="${book.title}">
        </div>
        <div class="lbody">
          <div class="lmeta"><div class="ltitle">${book.title}</div><div class="lauthor">${book.author}</div></div>
          <span class="lbadge" style="background:${c.bg};color:${c.text}">${book.cat}</span>
          <div class="ldesc">${book.desc}</div>
          <div class="lfoot">
            <span class="lstatus"><span class="dot${away?" away":""}"></span>${away?"У сотрудника":"В офисе"}</span>
            <button class="book-btn" ${away?"disabled":""} onclick="bookIt(this,'${book.title.replace(/'/g,"\\'")}','${book.author.replace(/'/g,"\\'")}',${away})">${away?"Недоступна":"Забронировать"}</button>
          </div>
        </div>`;
      cont.appendChild(el);
      loadRealCover(book.title,book.author,el.querySelector("img.real"));
    });
  }
}
render();
</script>
