<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека офиса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--ink-2:#4a4a45;--ink-3:#8a8a84;
  --paper:#f5f3ee;--paper-2:#eceae4;--paper-3:#dedad2;
  --green:#3da874;--orange:#d4880e;--blue:#2d5be3;--blue-bg:#eef2fd;
}
@media(prefers-color-scheme:dark){:root{
  --ink:#f0ede6;--ink-2:#aaa89f;--ink-3:#6a6a62;
  --paper:#141412;--paper-2:#1e1e1b;--paper-3:#2a2a26;
}}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.header{padding:2.5rem 2rem 1.5rem;max-width:1160px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;border-bottom:1px solid var(--paper-3)}
.header h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.4rem,3.5vw,2rem);font-weight:600;line-height:1.1;letter-spacing:-.02em}
.header p{margin-top:.4rem;font-size:12px;color:var(--ink-3)}
.hcount{font-family:'Unbounded',sans-serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:600;color:var(--paper-3);line-height:1;letter-spacing:-.04em;user-select:none}
.controls{max-width:1160px;margin:0 auto;padding:1.25rem 2rem 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.swrap{position:relative;flex:1;min-width:200px}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
#search{width:100%;height:40px;padding:0 12px 0 36px;font-size:14px;font-family:inherit;background:var(--paper-2);border:1.5px solid var(--paper-3);border-radius:10px;color:var(--ink);outline:none;transition:border-color .15s}
#search:focus{border-color:var(--blue)}
#search::placeholder{color:var(--ink-3)}
.filters{max-width:1160px;margin:0 auto;padding:.75rem 2rem 0;display:flex;gap:6px;flex-wrap:wrap}
.fbtn{font-size:12px;font-family:inherit;padding:5px 13px;border-radius:20px;border:1.5px solid var(--paper-3);background:var(--paper-2);color:var(--ink-2);cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--ink-3);color:var(--ink)}
.fbtn.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);font-weight:500}
.stats{max-width:1160px;margin:0 auto;padding:.75rem 2rem .5rem;font-size:13px;color:var(--ink-3)}
.stats strong{color:var(--ink-2);font-weight:500}
.grid{max-width:1160px;margin:0 auto;padding:0 2rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:var(--paper-2);border:1.5px solid var(--paper-3);border-radius:14px;padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--ink-3);transform:translateY(-2px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-meta{flex:1;min-width:0}
.ctitle{font-size:14px;font-weight:500;line-height:1.35;color:var(--ink)}
.cauthor{font-size:12px;color:var(--ink-3);margin-top:3px}
.cbadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.dtoggle{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-3);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;transition:color .12s;width:fit-content}
.dtoggle:hover{color:var(--ink-2)}
.dtoggle svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;transition:transform .2s;flex-shrink:0}
.dtoggle.open svg{transform:rotate(180deg)}
.dbody{font-size:13px;color:var(--ink-2);line-height:1.65;overflow:hidden;max-height:0;transition:max-height .3s ease}
.dbody.open{max-height:400px}
.cfoot{padding-top:10px;border-top:1px solid var(--paper-3);display:flex;align-items:center;justify-content:space-between;gap:8px}
.status{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.dot.away{background:var(--orange)}
.book-btn{font-size:12px;font-family:inherit;font-weight:500;padding:5px 12px;border-radius:8px;border:1.5px solid var(--paper-3);background:var(--paper);color:var(--ink-2);cursor:pointer;transition:all .12s;white-space:nowrap}
.book-btn:hover:not(:disabled){border-color:var(--green);color:#1a6640;background:#f0faf5}
.book-btn:disabled{opacity:.4;cursor:default}
.book-btn.done{border-color:var(--green);color:#1a6640;background:#f0faf5}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:var(--paper);font-size:13px;padding:10px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:4rem 2rem;color:var(--ink-3);font-size:14px;grid-column:1/-1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--paper-3);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <div><h1>Библиотека<br>офиса</h1><p>«О книге» — описание · «Забронировать» — скопирует запрос в буфер</p></div>
  <div class="hcount" id="tc"></div>
</div>
<div class="controls">
  <div class="swrap">
    <svg class="sico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Поиск по названию или автору…" autocomplete="off">
  </div>
</div>
<div class="filters" id="filters"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>
<script>
const BOOKS=[{"author": "Балабанов", "title": "Занимательное медиапланирование", "status": "в офисе", "desc": "Практическое руководство по планированию рекламных кампаний в медиа: как распределять бюджет, выбирать каналы и оценивать эффективность. Полезна всем, кто работает с рекламой и хочет понять логику медиапланирования.", "cat": "Маркетинг"}, {"author": "Ансофф", "title": "Стратегический менеджмент", "status": "в офисе", "desc": "Классика стратегического управления: как анализировать внешнюю среду, ставить долгосрочные цели и строить структуру компании под стратегию. Фундаментальная книга для руководителей и стратегов.", "cat": "Менеджмент"}, {"author": "Джефф Лоусон", "title": "Спроси разработчика", "status": "в офисе", "desc": "CEO Twilio объясняет, почему ПО стало главным конкурентным оружием и как бизнесу выстроить диалог с разработчиками. Помогает менеджерам и предпринимателям понять, как технологии создают ценность.", "cat": "Психология"}, {"author": "Джон Ле Карре", "title": "Шпион, пришедший с холода", "status": "в офисе", "desc": "Культовый шпионский роман о британском агенте, чья последняя миссия обнажает моральную пустоту холодной войны. Мрачная, психологически точная история о том, что значит служить системе.", "cat": "Художественная"}, {"author": "Том Демарко", "title": "Deadline", "status": "в офисе", "desc": "Роман-притча об управлении проектами: главный герой руководит командой разработчиков в вымышленной стране и учится на собственных ошибках. Увлекательно и практично — о сроках, людях и провалах проектов.", "cat": "Менеджмент"}, {"author": "Рагурам Раджан", "title": "Линии Разлома", "status": "в офисе", "desc": "Экономист из МВФ анализирует глубинные причины финансового кризиса 2008 года — неравенство, политику дешёвых кредитов и перекосы глобальной экономики. Помогает понять системные риски современного капитализма.", "cat": "Стратегия"}, {"author": "Робин Шарма", "title": "Монах, который продал свой феррари", "status": "в офисе", "desc": "Притча о преуспевающем юристе, который бросил всё и нашёл смысл жизни в Гималаях. Простые принципы личной эффективности и душевного равновесия, изложенные в форме истории.", "cat": "Психология"}, {"author": "Итан Расиел", "title": "Метод McKinsey", "status": "в офисе", "desc": "Бывший консультант McKinsey раскрывает инструменты структурированного решения бизнес-задач: гипотезы, пирамида аргументов, работа с данными. Незаменима для аналитиков, консультантов и всех, кто решает сложные задачи.", "cat": "Менеджмент"}, {"author": "Джозеф Хеллер", "title": "Поправки-22", "status": "в офисе", "desc": "Сатирический роман о безумии военной бюрократии — лётчик Йоссариан пытается выжить в системе, где любое здравое решение противоречит правилам. Один из величайших антивоенных романов XX века.", "cat": "Художественная"}, {"author": "Сет Годин", "title": "Фиолетовая корова", "status": "в офисе", "desc": "Маркетолог-гуру доказывает: традиционная реклама мертва, и единственный способ выжить — создавать продукты, о которых люди говорят сами. Книга меняет взгляд на то, что значит быть замеченным на рынке.", "cat": "Маркетинг"}, {"author": "Брент Доннели", "title": "Альфа-трейдер", "status": "в офисе", "desc": "Руководство от опытного валютного трейдера: психология рынка, управление рисками, торговые стратегии и дисциплина. Полезна всем, кто работает с финансовыми рынками и хочет мыслить как профессионал.", "cat": "Инвестиции"}, {"author": "Дмитрий Соколов-Митрич", "title": "Яндекс.Книга", "status": "в офисе", "desc": "Журналистская история о том, как из маленькой московской компании вырос один из крупнейших интернет-гигантов мира. Живо, честно и с деталями, которых не найдёшь в официальных пресс-релизах.", "cat": "Бизнес-истории"}, {"author": "Уолтер Айзексон", "title": "Стив Джобс", "status": "в офисе", "desc": "Авторизованная биография основателя Apple — от гаража до главной технологической компании мира. Портрет гения и тирана, история о том, как перфекционизм и видение меняют целые индустрии.", "cat": "Бизнес-истории"}, {"author": "Стивен Р. Кови", "title": "7 навыков высокоэффективных людей", "status": "в офисе", "desc": "Принципы личной эффективности и лидерства: от проактивности и расстановки приоритетов до синергии и постоянного обновления. Одна из самых влиятельных книг по саморазвитию всех времён.", "cat": "Психология"}, {"author": "Дэвид Вайз", "title": "Прорыв в духе времени Google", "status": "в офисе", "desc": "История о том, как два аспиранта Стэнфорда создали компанию, изменившую информационный мир. Интересна как пример того, как техническая идея превращается в глобальную платформу.", "cat": "Бизнес-истории"}, {"author": "Менкью", "title": "Принципы экономики", "status": "в офисе", "desc": "Базовый учебник экономики, по которому учатся студенты по всему миру: спрос и предложение, рынки, монополии, макроэкономика. Доступный фундамент для понимания экономических процессов.", "cat": "Стратегия"}, {"author": "Портер", "title": "Конкурентная стратегия", "status": "в офисе", "desc": "Майкл Портер формулирует пять сил конкуренции и три базовые стратегии — лидерство по издержкам, дифференциация, фокус. Обязательное чтение для стратегического анализа любой отрасли.", "cat": "Маркетинг"}, {"author": "Дункан Кларк", "title": "Alibaba: история мирового восхождения", "status": "в офисе", "desc": "Биография Джека Ма и история создания крупнейшей торговой платформы мира — от учителя английского до самого богатого человека Китая. Показывает, как амбиции и упорство побеждают все стартовые условия.", "cat": "Бизнес-истории"}, {"author": "Сигео Синго", "title": "Быстрая переналадка", "status": "в офисе", "desc": "Инженер Toyota описывает систему SMED — как сократить время переналадки оборудования с часов до минут. Практическая книга для производственников и всех, кто занимается оптимизацией процессов.", "cat": "Стратегия"}, {"author": "Ларри Веббер", "title": "Эффективный маркетинг в интернете", "status": "в офисе", "desc": "Системный взгляд на цифровой маркетинг: от сайтов и email до социальных сетей и аналитики. Полезна для тех, кто хочет выстроить онлайн-присутствие бренда осмысленно.", "cat": "Маркетинг"}, {"author": "Алан Лафли, Роджер Мартин", "title": "Игра на победу", "status": "в офисе", "desc": "Экс-CEO P&G и профессор Гарварда объясняют стратегию через пять ключевых выборов: где играть и как побеждать. Один из лучших практических фреймворков стратегического мышления.", "cat": "Маркетинг"}, {"author": "Майерс", "title": "Социальная психология", "status": "в офисе", "desc": "Академический, но увлекательный учебник о том, как социальное окружение влияет на поведение людей: конформизм, предрассудки, помощь другим, агрессия. Понимание этих механизмов полезно в любой работе с людьми.", "cat": "Психология"}, {"author": "Станислас Деан", "title": "Как мы учимся", "status": "в офисе", "desc": "Нейробиолог объясняет механизмы обучения мозга: почему одни методы работают, а другие — нет, и как использовать науку для эффективного освоения навыков. Меняет подход к обучению сотрудников и саморазвитию.", "cat": "Психология"}, {"author": "Хэл Вэриан", "title": "Микроэкономика", "status": "в офисе", "desc": "Углублённый курс микроэкономики от главного экономиста Google: теория потребителя, фирмы, рынков и информации. Полезна для понимания экономической логики бизнес-решений.", "cat": "Стратегия"}, {"author": "Эрик Рис", "title": "Бизнес с нуля", "status": "в офисе", "desc": "Манифест Lean Startup: строй, измеряй, учись — итерируй быстро, проверяй гипотезы на минимальном продукте, не трать ресурсы на то, что не нужно рынку. Библия современного предпринимательства.", "cat": "Стратегия"}, {"author": "Клотер Рапай", "title": "Культурный код", "status": "в офисе", "desc": "Маркетолог-психоаналитик раскрывает, как культурные архетипы влияют на поведение потребителей в разных странах. Помогает понять, почему одни продукты и идеи приживаются, а другие — нет.", "cat": "Маркетинг"}, {"author": "Джефф Сазерленд", "title": "Революционный метод управления проектами", "status": "в офисе", "desc": "Создатель Scrum рассказывает, как метод гибкого управления проектами, рождённый в IT, работает в любой отрасли. Практично и убедительно о том, как команды делают больше за меньшее время.", "cat": "Менеджмент"}, {"author": "Друкер П.", "title": "Энциклопедия менеджмента", "status": "в офисе", "desc": "Сборник ключевых идей Питера Друкера — отца современного менеджмента: о задачах управления, эффективности, инновациях и ответственности бизнеса. Настольная книга для любого руководителя.", "cat": "Менеджмент"}, {"author": "Кенинчи Омаэ", "title": "Мышление стратега", "status": "в офисе", "desc": "Японский консультант McKinsey описывает искусство стратегического анализа: как думать нелинейно, видеть систему целиком и находить нестандартные решения. Формирует стратегическое мышление.", "cat": "Менеджмент"}, {"author": "Сэм Уолтон", "title": "Сделано в Америке", "status": "в офисе", "desc": "Автобиография основателя Walmart — история о том, как торговец из маленького города построил крупнейшую розничную сеть мира. Честно о принципах, ошибках и одержимости деталями.", "cat": "Бизнес-истории"}, {"author": "Манфред Кетс де Врис", "title": "Лидер на кушетке", "status": "в офисе", "desc": "Психоаналитик и профессор INSEAD исследует тёмную сторону лидерства: нарциссизм, страхи, деструктивные паттерны руководителей. Помогает понять себя и управлять людьми осознаннее.", "cat": "Менеджмент"}, {"author": "Марвин Бауэр", "title": "Курс на лидерство", "status": "в офисе", "desc": "Основатель McKinsey о том, что делает компанию великой: ценности, честность, стандарты профессионализма и культура лидерства. Классика корпоративного управления.", "cat": "Менеджмент"}, {"author": "Нордстрем, Риддерстрале", "title": "Бизнес в стиле фанк", "status": "в офисе", "desc": "Провокационный манифест о том, что в эпоху избытка выигрывают компании с характером, а не просто с хорошим продуктом. Заряжает нестандартным взглядом на конк const BC={"Менеджмент": {"bg": "#eef0fe", "text": "#3d4cc4"}, "Маркетинг": {"bg": "#fef0ea", "text": "#b84a1a"}, "Бизнес-истории": {"bg": "#e8f7f0", "text": "#0f6e50"}, "Стратегия": {"bg": "#e8f2fd", "text": "#1a5fa8"}, "Инвестиции": {"bg": "#fdf4e0", "text": "#8a5500"}, "Психология": {"bg": "#fcedf4", "text": "#9a2f5e"}, "Художественная": {"bg": "#f1efe9", "text": "#5a5850"}, "Письмо и речь": {"bg": "#edf7e8", "text": "#2e6b18"}, "Другое": {"bg": "#f1efe9", "text": "#5a5850"}};
const CATS=["Все","Менеджмент","Маркетинг","Бизнес-истории","Стратегия","Инвестиции","Психология","Художественная","Письмо и речь"];
let filter="Все",q="";
document.getElementById("tc").textContent=BOOKS.length;
const fe=document.getElementById("filters");
CATS.forEach(c=>{
  const b=document.createElement("button");
  b.className="fbtn"+(c==="Все"?" active":"");
  b.textContent=c;
  b.onclick=()=>{filter=c;document.querySelectorAll(".fbtn").forEach(x=>x.classList.toggle("active",x.textContent===c));render();};
  fe.appendChild(b);
});
document.getElementById("search").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});

function toggleDesc(btn){
  const body=btn.nextElementSibling;
  const open=body.classList.toggle("open");
  btn.classList.toggle("open",open);
  btn.querySelector(".lbl").textContent=open?"свернуть":"о книге";
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

function bookIt(btn,title,author,away){
  if(away) return;
  const text=`Хочу взять книгу из офисной библиотеки:\n«${title}» — ${author}`;
  navigator.clipboard?.writeText(text).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand("copy");document.body.removeChild(ta);
  });
  btn.textContent="Скопировано ✓";
  btn.classList.add("done");
  showToast("Запрос скопирован — вставь в общий чат 📚");
  setTimeout(()=>{btn.textContent="Забронировать";btn.classList.remove("done");},3000);
}

function render(){
  const filtered=BOOKS.filter(b=>{
    const mc=filter==="Все"||b.cat===filter;
    const mq=!q||b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById("stats").innerHTML=`Показано <strong>${filtered.length}</strong> из <strong>${BOOKS.length}</strong> книг`;
  const grid=document.getElementById("grid");
  if(!filtered.length){grid.innerHTML=`<div class="empty">Ничего не найдено</div>`;return;}
  grid.innerHTML="";
  filtered.forEach(book=>{
    const c=BC[book.cat]||BC["Другое"];
    const away=book.status!=="в офисе";
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <div class="card-top">
        <div class="card-meta">
          <div class="ctitle">${book.title}</div>
          <div class="cauthor">${book.author}</div>
        </div>
        <span class="cbadge" style="background:${c.bg};color:${c.text}">${book.cat}</span>
      </div>
      <button class="dtoggle" onclick="toggleDesc(this)">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="lbl">о книге</span>
      </button>
      <div class="dbody">${book.desc}</div>
      <div class="cfoot">
        <span class="status"><span class="dot${away?" away":""}"></span>${away?"У сотрудника":"В офисе"}</span>
        <button class="book-btn"${away?" disabled":""} onclick="bookIt(this,'${book.title.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${book.author.replace(/'/g,"\\'").replace(/"/g,"&quot;")}',${away})">${away?"Недоступна":"Забронировать"}</button>
      </div>`;
    grid.appendChild(el);
  });
}
render();
</script>
</body>
</html>
